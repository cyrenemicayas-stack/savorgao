<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Savorgao</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
      position: relative;
      height: 100vh;
    }

    .overlay {
      background-color: rgba(0, 0, 0, 0.6);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .form-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
     
    }

    .card-title {
      color: #2c3e50;
      font-weight: bold;
      text-shadow: 1px 1px #fff;
    }

    .form-label,
    .form-check-label {
      color: #2c3e50;
    }

    a {
      color: #007bff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .logo {
      display: block;
      margin: 0 auto 20px auto;
      width: 100px;
      height: auto;
    }

    .btn-primary {
      background-color: #e74c3c;
      border: none;
    }

    .btn-primary:hover {
      background-color: #c0392b;
    }

    .social-icons a {
      color: #2c3e50;
      transition: color 0.3s;
    }

    .social-icons a:hover {
      color: #e74c3c;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="form-container container">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg">
        <div class="card-body">
          
        
          <img src="savorgaologo.png" alt="Savorgao Logo" class="logo">
          
          <h3 class="card-title text-center mb-4">Create an Account</h3>
          
          <form action="index.html" method="GET">
            <div class="mb-3">
              <label for="fullname" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fullname" name="fullname" placeholder="Enter your full name" required>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" required>
            </div>

            <div class="mb-3">
              <label for="confirm-password" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="confirm-password" name="confirm-password" placeholder="Re-type your password" required>
            </div>

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="terms" required>
              <label class="form-check-label" for="terms">I agree to the <a href="#">terms & conditions</a></label>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign Up</button>
          </form>

          <p class="text-center mt-4 mb-2">or continue with</p>

          <div class="text-center social-icons mb-3">
            <a href="https://facebook.com" target="_blank" class="mx-2"><i class="bi bi-facebook fs-4"></i></a>
            <a href="https://google.com" target="_blank" class="mx-2"><i class="bi bi-google fs-4"></i></a>
            <a href="https://twitter.com" target="_blank" class="mx-2"><i class="bi bi-twitter fs-4"></i></a>
          </div>

          <p class="text-center mt-3 mb-0">
            Already have an account? <a href="login.html">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
