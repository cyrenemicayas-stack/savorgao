<!DOCTYPE html>
<html>
<head>

  <title>Savorgao - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .custom-navbar {
      background-color: #f4c095;
    }

    .navbar .navbar-brand {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      color: #3e2723 !important;
    }

    .navbar .nav-link {
      color: #5d4037 !important;
      font-weight: 600;
    }

    .navbar .nav-link:hover {
      color: #e65100 !important;
    }

    .hero {
      height: 95vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      color: white;
      z-index: 1;
      text-shadow: 2px 2px 4px #000;
      max-width: 50%;
    }

    .hero h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3.5rem;
      color: #fffde7;
    }

    .hero p {
      font-size: 1.25rem;
      color: #ffecb3;
    }

    .btn-warning {
      background-color: #ff9800;
      border: none;
      font-weight: bold;
    }

    .btn-warning:hover {
      background-color: #fb8c00;
    }

    .hero-carousel {
      position: relative;
      width: 450px;
      height: 450px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-carousel .carousel {
      position: absolute;
      width: 300px;
      height: 300px;
      overflow: hidden;
      border-radius: 50%;
      box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.5);
    }

    .hero-carousel .carousel-item {
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      transition: opacity 1s ease-in-out;
    }

    .carousel-item img {
      border-radius: 50%;
      width: 100%;
      height: auto;
      object-fit: cover;
      transition: transform 0.5s ease, opacity 0.5s ease;
    }

    .carousel-item img:hover {
      transform: scale(1.1);
      opacity: 0.85;
    }

    .carousel-item-next, .carousel-item-prev, .carousel-item.active {
      transition: transform 1s ease, opacity 1s ease;
    }

    .hero-carousel .carousel:nth-child(1) {
      transform: rotate(0deg) translateX(180px);
    }

    .hero-carousel .carousel:nth-child(2) {
      transform: rotate(120deg) translateX(180px);
    }

    .hero-carousel .carousel:nth-child(3) {
      transform: rotate(240deg) translateX(180px);
    }

    .carousel-control-prev, .carousel-control-next {
      display: none;
    }

    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        padding: 20px;
        height: auto;
      }

      .hero-content {
        max-width: 100%;
        text-align: center;
      }

      .hero-carousel {
        width: 100%;
        margin-top: 2rem;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="savorgaologo.png" alt="Savorgao Logo" style="height: 50px; width: 50px; border-radius: 50%; margin-right: 10px;">
        Savorgao
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="recipes.html">Recipes</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1 class="display-4 fw-bold">Start Your Flavor<br>Journey Through Siargao</h1>
      <p class="lead">From Shore to Serving: Siargao on Your Plate</p>
      <a href="recipes.html" class="btn btn-warning btn-lg mt-3">Explore Recipes</a>
    </div>

    <div class="hero-carousel">
  
      <div id="carousel1" class="carousel slide carousel-fade" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="bukogulaman.jpg" alt="buko">
          </div>
          <div class="carousel-item">
            <img src="camotecue.jpg" alt="camote">
          </div>
          <div class="carousel-item">
            <img src="coconuticecream.jpg" alt="icecream">
          </div>
          <div class="carousel-item">
            <img src="ubehalaya.jpg" alt="ube">
          </div>
        </div>
      </div>

      
      <div id="carousel2" class="carousel slide carousel-fade" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="ginataangalimasag.jpg" alt="Ginataang Alimasag">
          </div>
          <div class="carousel-item">
            <img src="sinuglaw.jpg" alt="sinuglaw">
          </div>
          <div class="carousel-item">
            <img src="adobongpusit.jpg" alt="adobo">
          </div>
          <div class="carousel-item">
            <img src="tinolamanok.jpg" alt="tinola">
          </div>
        </div>
      </div>

     
      <div id="carousel3" class="carousel slide carousel-fade" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="tapsilog.jpg" alt="tapsilog">
          </div>
          <div class="carousel-item">
            <img src="suman.jpg" alt="suman">
          </div>
          <div class="carousel-item">
            <img src="lugaw.jpg" alt="lugaw">
          </div>
          <div class="carousel-item">
            <img src="dangsilog.jpg" alt="dangsilog">
          </div>
        </div>
      </div>
    </div>
  </header>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
   
    const carousels = ['carousel1', 'carousel2', 'carousel3'];
    setInterval(() => {
      carousels.forEach(id => {
        const el = document.getElementById(id);
        const carousel = bootstrap.Carousel.getOrCreateInstance(el);
        carousel.next();
      });
    }, 3000);
  </script>
</body>
</html>
